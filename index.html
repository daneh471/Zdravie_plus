<!DOCTYPE html>
<html lang="sk" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Zdravie+" />
  <title>Zdravie+</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    :root { --bg: #f5f5f5; --header: #e8e8e8; --text: #000; --card: #fff; }
    :root.dark { --bg: #0d0d0d; --header: #1a1a1a; --text: #fff; --card: #222; }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    img { max-width: 100%; height: auto; }

    html { background-color: var(--bg); transition: background-color 0.3s; height: 100%; width: 100%; overflow: hidden; }

    body { 
      background-color: transparent; 
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      transition: 0.3s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 1rem;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 30rem;
      height: 100%;
      position: relative;
      padding: calc(4.5rem + env(safe-area-inset-top)) 1rem calc(2rem + env(safe-area-inset-bottom)) 1rem;
      text-align: center;
      background-color: transparent;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      overflow-y: auto;
      align-items: center;
    }

    header { 
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 30rem;
      z-index: 1000;
      background-color: var(--header); 
      padding: 0 10px; 
      height: 45px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center; 
      box-shadow: 0 0.125rem 0.3125rem rgba(0,0,0,0.1); 
      box-sizing: border-box;
    }
    .header-logo-container { height: 100%; display: flex; align-items: center; justify-content: flex-start; }
    .header-logo { height: 100%; max-height: 45px; width: auto; object-fit: contain; pointer-events: none; }
    .header-title { justify-self: center; font-weight: 800; font-size: 1.3rem; background: linear-gradient(45deg, #FF8800, #ffb366); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
    header button { background-color: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 0.5rem; color: var(--text); display: flex; align-items: center; min-width: 2.75rem; min-height: 2.75rem; justify-content: center; justify-self: end; }
    
    .dropdown-content { display: none; position: absolute; right: 0.5rem; top: calc(3.8rem + env(safe-area-inset-top)); background-color: var(--card); width: max-content; max-width: 90vw; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.3); z-index: 1001; border-radius: 1rem; overflow: hidden; max-height: calc(100dvh - 5rem); flex-direction: column; padding: 0.5rem; box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); }
    .dropdown-content button { display: block; width: 100%; padding: 0.625rem 0.9375rem; border: none; background: none; text-align: left; font-size: 1rem; cursor: pointer; color: var(--text); flex-shrink: 1; border-bottom: 1px solid rgba(128,128,128,0.1); white-space: nowrap; }
    .dropdown-content button:last-child { border-bottom: none; }

    .numeric-keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; width: 100%; margin-top: 0.5rem; grid-column: span 2; }
    .numeric-keypad button { padding: 0.6rem; font-size: 1.1rem; border-radius: 0.6rem; background-color: var(--card); color: var(--text); border: 1px solid rgba(128,128,128,0.3); cursor: pointer; font-weight: 600; min-height: 2.8rem; display: flex; align-items: center; justify-content: center; }

    .form-container, .modal-form-grid { margin: 0 auto; width: 100%; padding: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
    input { min-width: 0; padding: 0.8rem; font-size: 1rem; background-color: var(--card); color: var(--text); border: 1px solid #ccc; border-radius: 0.8rem; appearance: none; width: 100%; }
    button.main { grid-column: span 2; background-color: #4CAF50; color: white; border: none; padding: 1rem; width: 100%; cursor: pointer; margin: 0.3rem 0; font-size: 1.1rem; border-radius: 0.8rem; font-weight: bold; box-shadow: 0 0.25rem 0.375rem rgba(0,0,0,0.1); min-height: 3.5rem; }
    button.secondary { background-color: #2196F3; color: white; border: none; padding: 0.75rem 1.25rem; min-width: 8.75rem; cursor: pointer; font-size: 1rem; border-radius: 0.75rem; min-height: 3rem; }

    .record-list { display: flex; flex-direction: column; width: 100%; border: 1px solid rgba(128,128,128,0.1); border-radius: 0.8rem; overflow: hidden; margin-top: 0.5rem; padding-bottom: 2rem;}
    .archive-header { display: grid; grid-template-columns: 24% 12% 12% 12% 12% 12% 16%; font-weight: bold; font-size: 11px; text-transform: uppercase; background-color: var(--header); border-bottom: 2px solid rgba(0,0,0,0.1); padding: 8px 2px; text-align: center; width: 100%; box-sizing: border-box; }
    .record-row { display: grid; grid-template-columns: 24% 12% 12% 12% 12% 12% 16%; align-items: center; background-color: var(--card); padding: 8px 2px; border-bottom: 1px solid rgba(128,128,128,0.2); width: 100%; box-sizing: border-box; font-size: 11px; text-align: center; gap: 0; }

    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 1rem; }
    .modal-content { background-color: var(--card); padding: 1.5rem; border-radius: 1.5rem; width: 90%; max-width: 400px; max-height: 96dvh; overflow: hidden; display: flex; flex-direction: column; justify-content: center; text-align: left; }

    #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 999; }
    #splashScreen img { width: 10rem; height: 10rem; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div id="splashScreen">
      <img src="favicon.png" alt="Zdravie+">
    </div>
    <div id="authScreen">
      <div class="auth-form">
        <h2>Zdravie+</h2>
        <div class="tab-buttons">
          <button class="secondary" onclick="window.showLogin()">Prihlásiť sa</button>
          <button class="secondary" onclick="window.showRegister()">Registrácia</button>
        </div>
        
        <div id="loginForm">
          <h3>Prihlásenie</h3>
          <input type="text" id="loginName" placeholder="Tvoje meno" style="width:80%; padding:0.8rem;">
          <input type="password" id="loginPin" placeholder="PIN (4-6 číslic)" style="width:80%; padding:0.8rem;" maxlength="6">
          <button class="main" onclick="window.loginUser(); return false;">Prihlásiť sa</button>
          <p id="loginError" style="color: red; font-size: 0.9rem;"></p>
        </div>

        <div id="registerForm" style="display: none;">
          <h3>Nový účet</h3>
          <input type="text" id="regName" placeholder="Tvoje meno" style="width:80%; padding:0.8rem;">
          <input type="password" id="regPin" placeholder="PIN (4-6 číslic)" style="width:80%; padding:0.8rem;" maxlength="6">
          <input type="password" id="regPinConfirm" placeholder="Zopakuj PIN" style="width:80%; padding:0.8rem;" maxlength="6">
          <button class="main" onclick="window.registerUser(); return false;">Vytvoriť účet</button>
          <p id="regError" style="color: red; font-size: 0.9rem;"></p>
        </div>
      </div>
    </div>

    <header style="display:none;">
      <div class="header-logo-container"><img src="favicon.png" class="header-logo" alt="Logo"></div>
      <span class="header-title">Zdravie+</span>
      <button onclick="window.toggleDropdown()">☰ Menu</button>
      <div id="dropdown" class="dropdown-content">
        <button onclick="window.zobrazArchiv(); window.toggleDropdown();">📄 Archív</button>
        <button onclick="window.otvoritModal(); window.toggleDropdown();">➕ Manuálny záznam</button>
        <button onclick="window.otvoritInfo(); window.toggleDropdown();">ℹ️ Informácie</button>
        <button onclick="window.logout(); window.toggleDropdown();">🚪 Odhlásiť sa</button>
      </div>
    </header>

    <div class="form-container" id="formular" style="display:none;">
      <input type="tel" id="inr" placeholder="INR" inputmode="decimal" />
      <input type="tel" id="tab" placeholder="TAB" inputmode="decimal" />
      <input type="tel" id="sys" placeholder="SYS" inputmode="decimal" />
      <input type="tel" id="dia" placeholder="DIA" inputmode="decimal" />
      <input type="tel" id="pulse" placeholder="PULZ" inputmode="decimal" />
      <button class="main" onclick="window.pridatZaznam()">Pridať záznam</button>
    </div>

    <div id="archiv" style="display:none; width: 100%;">
      <h2>Archív záznamov</h2>
      <button class="main" onclick="window.skrytArchiv()">Späť na formulár</button>
      <div id="archivList" class="record-list"></div>
    </div>

    <div id="manualModal" class="modal"><div class="modal-content">
      <h3>Manuálny záznam</h3>
      <div class="modal-form-grid">
        <input type="text" id="manualDatum" placeholder="Dátum (dd.mm.rr)" onfocus="window.setFocused(this)" inputmode="none">
        <input type="tel" id="manualInr" placeholder="INR" onfocus="window.setFocused(this)" inputmode="none">
        <input type="tel" id="manualTab" placeholder="TAB" onfocus="window.setFocused(this)" inputmode="none">
        <input type="tel" id="manualSys" placeholder="SYS" onfocus="window.setFocused(this)" inputmode="none">
        <input type="tel" id="manualDia" placeholder="DIA" onfocus="window.setFocused(this)" inputmode="none">
        <input type="tel" id="manualPulse" placeholder="PULZ" onfocus="window.setFocused(this)" inputmode="none">
        <div class="numeric-keypad">
          <button onclick="window.keypadInput('1')">1</button><button onclick="window.keypadInput('2')">2</button><button onclick="window.keypadInput('3')">3</button><button onclick="window.keypadInput('CLEAR')" style="color:#f44;">C</button>
          <button onclick="window.keypadInput('4')">4</button><button onclick="window.keypadInput('5')">5</button><button onclick="window.keypadInput('6')">6</button><button onclick="window.keypadInput('DEL')" style="color:#f80;">⌫</button>
          <button onclick="window.keypadInput('7')">7</button><button onclick="window.keypadInput('8')">8</button><button onclick="window.keypadInput('9')">9</button><button onclick="window.keypadInput('/')">/</button>
          <button onclick="window.keypadInput('.')">.</button><button onclick="window.keypadInput('0')">0</button><button onclick="window.keypadInput(',')">,</button><button onclick="window.keypadInput('-')">-</button>
        </div>
        <button class="main" onclick="window.ulozitManual()">Uložiť</button>
      </div>
      <button class="main" onclick="window.zavrietModal()">Zatvoriť</button>
    </div></div>

    <div id="infoModal" class="modal"><div class="modal-content">
      <h3>Informácie</h3>
      <p><strong>INR:</strong> 2–3 | <strong>SYS:</strong> 90–140 | <strong>DIA:</strong> 60–90</p>
      <button class="main" onclick="window.zavrietInfo()">Zatvoriť</button>
    </div></div>

    <div id="customDialog" class="modal"><div class="modal-content">
      <h3 id="dialogTitle">Upozornenie</h3>
      <p id="dialogMessage"></p>
      <button id="dialogOkBtn" class="main">OK</button>
    </div></div>

    <div id="toast" style="display:none; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background-color: #333; color: #fff; padding: 0.8rem 1.2rem; border-radius: 0.5rem; z-index: 1000;"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlzYqLEcy1OzZMcGOlidQRr8tNdZNXsSk",
      authDomain: "zdravie-plus-5193f.firebaseapp.com",
      projectId: "zdravie-plus-5193f",
      storageBucket: "zdravie-plus-5193f.appspot.com",
      messagingSenderId: "21608089094",
      appId: "1:21608089094:web:53b5f9fc60d51ae96ba587"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.showLogin = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
    window.showRegister = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };

    window.registerUser = async function() {
      const name = document.getElementById('regName').value.trim();
      const pin = document.getElementById('regPin').value;
      if (!name || pin.length < 4) return alert('Meno a PIN (min 4 číslice)!');
      try {
        const email = `${name}${Date.now()}@zdravie.local`;
        const res = await createUserWithEmailAndPassword(auth, email, pin);
        await addDoc(collection(db, 'users'), { uid: res.user.uid, name: name, email: email });
        alert('Účet vytvorený!');
      } catch (e) { alert(e.message); }
    };

    window.loginUser = async function() {
      const name = document.getElementById('loginName').value.trim();
      const pin = document.getElementById('loginPin').value;
      try {
        const q = query(collection(db, 'users'), where('name', '==', name));
        const snap = await getDocs(q);
        if (snap.empty) return alert('Užívateľ nenájdený');
        await signInWithEmailAndPassword(auth, snap.docs[0].data().email, pin);
      } catch (e) { alert('Nesprávny PIN'); }
    };

    onAuthStateChanged(auth, (user) => {
      document.getElementById('splashScreen').style.opacity = '0';
      setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 500);
      if (user) {
        window.user = user;
        document.getElementById('authScreen').style.display = 'none';
        document.querySelector('header').style.display = 'grid';
        document.getElementById('formular').style.display = 'block';
        window.loadRecords();
      } else {
        document.getElementById('authScreen').style.display = 'flex';
        document.querySelector('header').style.display = 'none';
        document.getElementById('formular').style.display = 'none';
        document.getElementById('archiv').style.display = 'none';
      }
    });

    window.loadRecords = async function() {
      const q = query(collection(db, 'zaznamy'), where('userId', '==', window.user.uid));
      const snap = await getDocs(q);
      window.zaznamy = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    };

    window.pridatZaznam = async function() {
      const data = {
        userId: window.user.uid,
        datum: window.formatDatum(),
        inr: document.getElementById('inr').value,
        tab: document.getElementById('tab').value,
        sys: document.getElementById('sys').value,
        dia: document.getElementById('dia').value,
        pulse: document.getElementById('pulse').value
      };
      if (!Object.values(data).some(v => v && v !== data.userId && v !== data.datum)) return;
      await addDoc(collection(db, 'zaznamy'), data);
      ['inr','tab','sys','dia','pulse'].forEach(id => document.getElementById(id).value = '');
      window.showToast('Uložené');
      window.loadRecords();
    };

    window.getColorStyle = (valStr, type) => {
      const val = parseFloat(valStr?.replace(',','.'));
      if (isNaN(val)) return '';
      let low, high;
      if (type === 'inr') { low = 2; high = 3; }
      else if (type === 'sys') { low = 90; high = 140; }
      else if (type === 'dia') { low = 60; high = 90; }
      else return '';
      if (val < low) return 'background:#f80;color:#000;font-weight:bold;';
      if (val > high) return 'background:#f33;color:#000;font-weight:bold;';
      return 'background:#3c3;color:#000;';
    };

    window.zobrazArchiv = function() {
      document.getElementById('formular').style.display = 'none';
      document.getElementById('archiv').style.display = 'block';
      const list = document.getElementById('archivList');
      list.innerHTML = '<div class="archive-header"><div>Dátum</div><div>INR</div><div>Tab</div><div>Sys</div><div>Dia</div><div>Pulz</div><div></div></div>';
      window.zaznamy.sort((a,b) => b.datum.localeCompare(a.datum)).forEach(r => {
        list.innerHTML += `<div class="record-row">
          <div>${r.datum}</div>
          <div style="${window.getColorStyle(r.inr,'inr')}">${r.inr||'-'}</div>
          <div>${r.tab||'-'}</div>
          <div style="${window.getColorStyle(r.sys,'sys')}">${r.sys||'-'}</div>
          <div style="${window.getColorStyle(r.dia,'dia')}">${r.dia||'-'}</div>
          <div>${r.pulse||'-'}</div>
          <div onclick="window.vymazatZaznam('${r.id}')">🗑️</div>
        </div>`;
      });
    };

    window.vymazatZaznam = async (id) => { if (confirm('Vymazať?')) { await deleteDoc(doc(db, 'zaznamy', id)); window.loadRecords(); window.zobrazArchiv(); }};
    window.formatDatum = () => { const d = new Date(); return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(-2)}`; };
    window.skrytArchiv = () => { document.getElementById('archiv').style.display = 'none'; document.getElementById('formular').style.display = 'block'; };
    window.logout = () => signOut(auth);
    window.toggleDropdown = () => { const d = document.getElementById('dropdown'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; };
    window.otvoritModal = () => document.getElementById('manualModal').style.display = 'flex';
    window.zavrietModal = () => document.getElementById('manualModal').style.display = 'none';
    window.otvoritInfo = () => document.getElementById('infoModal').style.display = 'flex';
    window.zavrietInfo = () => document.getElementById('infoModal').style.display = 'none';
    window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); };

    let lastFocused;
    window.setFocused = (el) => lastFocused = el;
    window.keypadInput = (v) => { if (!lastFocused) return; if (v === 'DEL') lastFocused.value = lastFocused.value.slice(0,-1); else if (v === 'CLEAR') lastFocused.value = ''; else lastFocused.value += v; };
    window.ulozitManual = async () => {
      const data = { userId: window.user.uid, datum: document.getElementById('manualDatum').value, inr: document.getElementById('manualInr').value, tab: document.getElementById('manualTab').value, sys: document.getElementById('manualSys').value, dia: document.getElementById('manualDia').value, pulse: document.getElementById('manualPulse').value };
      await addDoc(collection(db, 'zaznamy'), data); window.zavrietModal(); window.loadRecords(); window.showToast('Uložené');
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.onupdatefound = () => {
          const installingWorker = reg.installing;
          installingWorker.onstatechange = () => {
            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.showUpdateUI();
            }
          };
        };
      });

      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'UPDATE_AVAILABLE') window.showUpdateUI();
      });
    }

    window.showUpdateUI = () => {
      const dialog = document.getElementById('customDialog');
      document.getElementById('dialogTitle').innerText = 'Aktualizácia';
      document.getElementById('dialogMessage').innerText = 'Nová verzia (v70) je k dispozícii. Kliknite na OK pre načítanie.';
      document.getElementById('dialogOkBtn').onclick = () => window.location.reload(true);
      dialog.style.display = 'flex';
    };
  </script>
</body>
</html>
